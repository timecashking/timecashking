<!doctype html>
<html lang="pt-br">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Autenticando...</title>
	<style>
		body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;margin:0;padding:40px;line-height:1.5;background:#0b1220;color:#e6eaf2}
		.container{max-width:720px;margin:0 auto}
		.card{background:#111a2b;border:1px solid #23314f;border-radius:12px;padding:24px}
	</style>
</head>
<body>
	<div class="container">
		<div class="card">
			<h1>Processando login…</h1>
			<p>Você será redirecionado em instantes.</p>
		</div>
	</div>
	<script>
	(function(){
		try{
			var params = new URLSearchParams(location.search);
			var token = params.get('token');
			if(token){
				localStorage.setItem('tck_jwt', token);
			}
		}finally{
			location.replace('/');
		}
	})();
	</script>
</body>
</html>
