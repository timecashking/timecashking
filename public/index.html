<!doctype html>
<html lang="pt-br">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>TimeCash King</title>
	<style>
		body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;margin:0;padding:40px;line-height:1.5;background:#0b1220;color:#e6eaf2}
		.container{max-width:760px;margin:0 auto}
		.card{background:#111a2b;border:1px solid #23314f;border-radius:12px;padding:24px}
		.btn{display:inline-block;margin-top:16px;padding:10px 16px;border-radius:8px;background:#3b82f6;color:white;text-decoration:none}
		code{background:#0e1627;padding:2px 6px;border-radius:6px}
		.small{font-size:.9rem;color:#a8b3cf}
		pre{white-space:pre-wrap;word-break:break-word;background:#0e1627;padding:12px;border-radius:8px}
	</style>
</head>
<body>
	<div class="container">
		<div class="card">
			<h1>TimeCash King</h1>
			<p>API pública:</p>
			<p>
				<a id="apiLink" class="btn" target="_blank" rel="noreferrer">Abrir API</a>
			</p>
			<p class="small">Health check: <code>/health</code></p>
			<hr/>
			<h3>Login</h3>
			<p><a id="loginGoogle" class="btn" href="#">Login com Google</a></p>
			<p class="small">Após o login, você voltará para esta página com <code>?token=...</code>. Usaremos esse token para chamar <code>/me</code>.</p>
			<p>
				<button id="btnMe" class="btn">Chamar /me</button>
				<button id="btnLogout" class="btn" style="background:#ef4444;margin-left:8px">Sair</button>
			</p>
			<hr/>
			<h3>Financeiro (teste rápido)</h3>
			<div style="display:flex;gap:16px;flex-wrap:wrap">
				<div style="flex:1;min-width:280px">
					<h4>Categoria</h4>
					<input id="catName" placeholder="Nome da categoria" style="width:100%;padding:10px;border-radius:8px;border:1px solid #23314f;background:#0e1627;color:#e6eaf2"/>
					<div>
						<button id="btnCatCreate" class="btn">Criar categoria</button>
						<button id="btnCatList" class="btn">Listar categorias</button>
					</div>
					<div style="margin-top:8px">
						<input id="catIdEdit" placeholder="ID da categoria" style="width:100%;padding:10px;border-radius:8px;border:1px solid #23314f;background:#0e1627;color:#e6eaf2"/>
						<input id="catNameEdit" placeholder="Novo nome" style="width:100%;padding:10px;border-radius:8px;border:1px solid #23314f;background:#0e1627;color:#e6eaf2;margin-top:6px"/>
						<div>
							<button id="btnCatRename" class="btn">Renomear</button>
							<button id="btnCatDelete" class="btn" style="background:#ef4444;margin-left:8px">Excluir</button>
						</div>
					</div>
				</div>
				<div style="flex:1;min-width:280px">
					<h4>Transação</h4>
					<select id="txType" style="width:100%;padding:10px;border-radius:8px;border:1px solid #23314f;background:#0e1627;color:#e6eaf2">
						<option value="INCOME">Receita</option>
						<option value="EXPENSE">Despesa</option>
					</select>
					<input id="txAmount" type="number" step="0.01" placeholder="Valor (ex: 150.00)" style="width:100%;padding:10px;border-radius:8px;border:1px solid #23314f;background:#0e1627;color:#e6eaf2;margin-top:8px"/>
					<select id="txCategory" style="width:100%;padding:10px;border-radius:8px;border:1px solid #23314f;background:#0e1627;color:#e6eaf2;margin-top:8px">
						<option value="">(Sem categoria)</option>
					</select>
					<input id="txDesc" placeholder="Descrição (opcional)" style="width:100%;padding:10px;border-radius:8px;border:1px solid #23314f;background:#0e1627;color:#e6eaf2;margin-top:8px"/>
					<div>
						<button id="btnTxCreate" class="btn">Criar transação</button>
						<button id="btnTxList" class="btn">Listar transações</button>
					</div>
					<div style="margin-top:8px">
						<label class="small">Filtros</label>
						<div style="display:flex;gap:8px;flex-wrap:wrap">
							<input id="fltStart" type="date" style="padding:10px;border-radius:8px;border:1px solid #23314f;background:#0e1627;color:#e6eaf2"/>
							<input id="fltEnd" type="date" style="padding:10px;border-radius:8px;border:1px solid #23314f;background:#0e1627;color:#e6eaf2"/>
							<select id="fltType" style="padding:10px;border-radius:8px;border:1px solid #23314f;background:#0e1627;color:#e6eaf2">
								<option value="">(Tipo)</option>
								<option value="INCOME">Receita</option>
								<option value="EXPENSE">Despesa</option>
							</select>
							<select id="fltCategory" style="padding:10px;border-radius:8px;border:1px solid #23314f;background:#0e1627;color:#e6eaf2">
								<option value="">(Categoria)</option>
							</select>
							<button id="btnTxFilter" class="btn">Filtrar</button>
						</div>
					</div>
					<div style="margin-top:8px">
						<input id="txIdEdit" placeholder="ID da transação" style="width:100%;padding:10px;border-radius:8px;border:1px solid #23314f;background:#0e1627;color:#e6eaf2"/>
						<input id="txAmountEdit" type="number" step="0.01" placeholder="Novo valor (opcional)" style="width:100%;padding:10px;border-radius:8px;border:1px solid #23314f;background:#0e1627;color:#e6eaf2;margin-top:6px"/>
						<input id="txDescEdit" placeholder="Nova descrição (opcional)" style="width:100%;padding:10px;border-radius:8px;border:1px solid #23314f;background:#0e1627;color:#e6eaf2;margin-top:6px"/>
						<div>
							<button id="btnTxUpdate" class="btn">Atualizar</button>
							<button id="btnTxDelete" class="btn" style="background:#ef4444;margin-left:8px">Excluir</button>
						</div>
					</div>
				</div>
			</div>

			<hr/>
			<h3>Resumo</h3>
			<div style="display:flex;gap:8px;flex-wrap:wrap">
				<input id="sumStart" type="date" style="padding:10px;border-radius:8px;border:1px solid #23314f;background:#0e1627;color:#e6eaf2"/>
				<input id="sumEnd" type="date" style="padding:10px;border-radius:8px;border:1px solid #23314f;background:#0e1627;color:#e6eaf2"/>
				<button id="btnSummary" class="btn">Consultar resumo</button>
				<button id="btnExportCsv" class="btn" style="margin-left:8px">Exportar CSV</button>
			</div>
			<pre id="out"></pre>
		</div>
	</div>
	<script>
	(function(){
		var fallback = 'https://timecashking-api.onrender.com';
		var api = (window.NETLIFY ? window.NETLIFY.env && window.NETLIFY.env.NEXT_PUBLIC_API_URL : null) || (window.env && window.env.NEXT_PUBLIC_API_URL) || (typeof NEXT_PUBLIC_API_URL !== 'undefined' && NEXT_PUBLIC_API_URL) || fallback;
		document.getElementById('apiLink').href = api;
		document.getElementById('apiLink').textContent = api;

		// Login URL
		document.getElementById('loginGoogle').href = api.replace(/\/$/,'') + '/integrations/google/auth';

		// Capture token from query (?token=...)
		var params = new URLSearchParams(location.search);
		var token = params.get('token');
		if (token) {
			localStorage.setItem('tck_jwt', token);
		}
		var stored = localStorage.getItem('tck_jwt') || '';
		if(stored){
			document.getElementById('out').textContent = 'Token presente. Clique em “Chamar /me” para ver seus dados.';
		}

		function setOut(value){
			document.getElementById('out').textContent = typeof value === 'string' ? value : JSON.stringify(value,null,2);
		}

		async function apiGet(path){
			const token = localStorage.getItem('tck_jwt') || '';
			const res = await fetch(api.replace(/\/$/,'') + path, {
				credentials: 'include',
				headers: token ? { 'Authorization': 'Bearer ' + token } : undefined,
			});
			return res.json().catch(()=>({ error: 'empty_response', status: res.status }));
		}
		async function apiPost(path, body){
			const token = localStorage.getItem('tck_jwt') || '';
			const res = await fetch(api.replace(/\/$/,'') + path, {
				method:'POST',
				credentials: 'include',
				headers: Object.assign({ 'Content-Type': 'application/json' }, token ? { 'Authorization': 'Bearer ' + token } : {}),
				body: body ? JSON.stringify(body) : undefined,
			});
			return res.json().catch(()=>({ error: 'empty_response', status: res.status }));
		}

		async function refreshCategoriesIntoSelect(){
			const cats = await apiGet('/categories');
			const sel = document.getElementById('txCategory');
			if (!Array.isArray(cats)) {
				setOut(cats || { error: 'Categorias retornaram formato inesperado' });
				return;
			}
			sel.innerHTML = '<option value="">(Sem categoria)</option>' + cats.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
			// filtros
			const fltSel = document.getElementById('fltCategory');
			fltSel.innerHTML = '<option value="">(Categoria)</option>' + cats.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
		}

		document.getElementById('btnMe').addEventListener('click', async function(){
			const data = await apiGet('/me');
			document.getElementById('out').textContent = JSON.stringify(data, null, 2);
		});

		document.getElementById('btnLogout').addEventListener('click', async function(){
			try{ await apiPost('/auth/logout'); }catch(e){}
			localStorage.removeItem('tck_jwt');
			location.reload();
		});

		document.getElementById('btnCatCreate').addEventListener('click', async function(){
			try{
				const name = document.getElementById('catName').value.trim();
				if(!name){ alert('Informe o nome da categoria'); return; }
				setOut('Criando categoria...');
				const data = await apiPost('/categories', { name });
				setOut(data);
				await refreshCategoriesIntoSelect();
			} catch(e){ setOut(String(e)); }
		});
		document.getElementById('btnCatList').addEventListener('click', async function(){
			try{
				setOut('Carregando categorias...');
				const data = await apiGet('/categories');
				if (!Array.isArray(data)) { setOut(data); return; }
				setOut(data);
			} catch(e){ setOut(String(e)); }
		});

		document.getElementById('btnCatRename').addEventListener('click', async function(){
			try{
				const id = document.getElementById('catIdEdit').value.trim();
				const name = document.getElementById('catNameEdit').value.trim();
				if(!id || !name){ alert('Informe ID e novo nome'); return; }
				setOut('Renomeando categoria...');
				const token = localStorage.getItem('tck_jwt') || '';
				const res = await fetch(api.replace(/\/$/,'') + '/categories/' + encodeURIComponent(id), {
					method: 'PATCH', credentials: 'include',
					headers: Object.assign({ 'Content-Type': 'application/json' }, token ? { 'Authorization': 'Bearer ' + token } : {}),
					body: JSON.stringify({ name })
				});
				const data = await res.json();
				setOut(data);
				await refreshCategoriesIntoSelect();
			} catch(e){ setOut(String(e)); }
		});

		document.getElementById('btnCatDelete').addEventListener('click', async function(){
			try{
				const id = document.getElementById('catIdEdit').value.trim();
				if(!id){ alert('Informe o ID da categoria'); return; }
				setOut('Excluindo categoria...');
				const token = localStorage.getItem('tck_jwt') || '';
				const res = await fetch(api.replace(/\/$/,'') + '/categories/' + encodeURIComponent(id), {
					method: 'DELETE', credentials: 'include',
					headers: token ? { 'Authorization': 'Bearer ' + token } : undefined,
				});
				const data = await res.json();
				setOut(data);
				await refreshCategoriesIntoSelect();
			} catch(e){ setOut(String(e)); }
		});

		document.getElementById('btnTxCreate').addEventListener('click', async function(){
			try{
				const type = document.getElementById('txType').value;
				const amount = document.getElementById('txAmount').value;
				const categoryId = document.getElementById('txCategory').value;
				const description = document.getElementById('txDesc').value;
				if(!amount){ alert('Informe o valor'); return; }
				setOut('Criando transação...');
				const data = await apiPost('/transactions', { type, amount, categoryId: categoryId || undefined, description: description || undefined });
				setOut(data);
			} catch(e){ setOut(String(e)); }
		});
		document.getElementById('btnTxList').addEventListener('click', async function(){
			try{
				setOut('Carregando transações...');
				const data = await apiGet('/transactions');
				setOut(data);
			} catch(e){ setOut(String(e)); }
		});

		document.getElementById('btnTxFilter').addEventListener('click', async function(){
			try{
				const s = document.getElementById('fltStart').value;
				const e = document.getElementById('fltEnd').value;
				const t = document.getElementById('fltType').value;
				const c = document.getElementById('fltCategory').value;
				let q = '/transactions?';
				const qs = [];
				if(s) qs.push('start='+encodeURIComponent(s));
				if(e) qs.push('end='+encodeURIComponent(e));
				if(t) qs.push('type='+encodeURIComponent(t));
				if(c) qs.push('categoryId='+encodeURIComponent(c));
				q += qs.join('&');
				setOut('Filtrando...');
				const data = await apiGet(q);
				setOut(data);
			} catch(e){ setOut(String(e)); }
		});

		document.getElementById('btnTxUpdate').addEventListener('click', async function(){
			try{
				const id = document.getElementById('txIdEdit').value.trim();
				if(!id){ alert('Informe o ID da transação'); return; }
				const amount = document.getElementById('txAmountEdit').value;
				const description = document.getElementById('txDescEdit').value;
				const token = localStorage.getItem('tck_jwt') || '';
				const body = {};
				if(amount) body.amount = amount;
				if(description) body.description = description;
				setOut('Atualizando transação...');
				const res = await fetch(api.replace(/\/$/,'') + '/transactions/' + encodeURIComponent(id), {
					method: 'PATCH', credentials: 'include',
					headers: Object.assign({ 'Content-Type': 'application/json' }, token ? { 'Authorization': 'Bearer ' + token } : {}),
					body: JSON.stringify(body)
				});
				const data = await res.json();
				setOut(data);
			} catch(e){ setOut(String(e)); }
		});

		document.getElementById('btnTxDelete').addEventListener('click', async function(){
			try{
				const id = document.getElementById('txIdEdit').value.trim();
				if(!id){ alert('Informe o ID da transação'); return; }
				setOut('Excluindo transação...');
				const token = localStorage.getItem('tck_jwt') || '';
				const res = await fetch(api.replace(/\/$/,'') + '/transactions/' + encodeURIComponent(id), {
					method: 'DELETE', credentials: 'include',
					headers: token ? { 'Authorization': 'Bearer ' + token } : undefined,
				});
				const data = await res.json();
				setOut(data);
			} catch(e){ setOut(String(e)); }
		});

		document.getElementById('btnSummary').addEventListener('click', async function(){
			const s = document.getElementById('sumStart').value;
			const e = document.getElementById('sumEnd').value;
			let q = '/summary';
			const qs = [];
			if(s) qs.push('start='+encodeURIComponent(s));
			if(e) qs.push('end='+encodeURIComponent(e));
			if(qs.length) q += '?' + qs.join('&');
			const data = await apiGet(q);
			document.getElementById('out').textContent = JSON.stringify(data, null, 2);
		});

		document.getElementById('btnExportCsv').addEventListener('click', function(){
			const s = document.getElementById('sumStart').value;
			const e = document.getElementById('sumEnd').value;
			let q = '/transactions/csv';
			const qs = [];
			if(s) qs.push('start='+encodeURIComponent(s));
			if(e) qs.push('end='+encodeURIComponent(e));
			if(qs.length) q += '?' + qs.join('&');
			const token = localStorage.getItem('tck_jwt') || '';
			// open new window to download CSV with auth header via query token (fallback)
			// For simplicity, append jwt as query when present (backend still checks cookie/header; token query is optional)
			if(token){
				q += (q.includes('?') ? '&' : '?') + 't=' + encodeURIComponent(token);
			}
			window.open(api.replace(/\/$/,'') + q, '_blank');
		});

		// Carregar categorias ao abrir a página
		refreshCategoriesIntoSelect().catch(()=>{});
	})();
	</script>
</body>
</html>
