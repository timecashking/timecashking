name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '18'
  PNPM_VERSION: '8'

jobs:
  # Testes e Linting
  test:
    name: Testes e Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Instalar dependências do backend
        run: |
          cd .
          npm ci
          
      - name: Instalar dependências do frontend
        run: |
          cd web
          npm ci
          
      - name: Instalar dependências do mobile
        run: |
          cd mobile
          npm ci
          
      - name: Linting do backend
        run: |
          cd .
          npm run lint || echo "Linting não configurado"
          
      - name: Linting do frontend
        run: |
          cd web
          npm run lint || echo "Linting não configurado"
          
      - name: Testes do backend
        run: |
          cd .
          npm test || echo "Testes não configurados"
          
      - name: Testes do frontend
        run: |
          cd web
          npm test || echo "Testes não configurados"
          
      - name: Build do frontend
        run: |
          cd web
          npm run build
          
      - name: Build do mobile (web)
        run: |
          cd mobile
          npm run web:build || echo "Build web não configurado"

  # Deploy do Backend (Render)
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Instalar dependências
        run: npm ci
        
      - name: Deploy para Render
        env:
          RENDER_TOKEN: ${{ secrets.RENDER_TOKEN }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          # Trigger deploy no Render via API
          curl -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}'
            
      - name: Aguardar deploy
        run: |
          echo "Aguardando deploy no Render..."
          sleep 60

  # Deploy do Frontend (Netlify)
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Instalar dependências
        run: |
          cd web
          npm ci
          
      - name: Build
        run: |
          cd web
          npm run build
          
      - name: Deploy para Netlify
        uses: nwtgck/actions-netlify@v2.0
        with:
          publish-dir: './web/dist'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy automático via GitHub Actions"
          enable-pull-request-comment: false
          enable-commit-comment: true
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 1

  # Build do Mobile App
  build-mobile:
    name: Build Mobile App
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          
      - name: Instalar dependências
        run: |
          cd mobile
          npm ci
          
      - name: Build Android
        run: |
          cd mobile
          eas build --platform android --non-interactive
          
      - name: Build iOS
        run: |
          cd mobile
          eas build --platform ios --non-interactive

  # Testes de Integração
  integration-tests:
    name: Testes de Integração
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Instalar dependências
        run: npm ci
        
      - name: Aguardar serviços ficarem online
        run: |
          echo "Aguardando serviços ficarem online..."
          sleep 120
          
      - name: Teste de Health Check
        run: |
          # Testar se a API está online
          curl -f https://timecashking-api.onrender.com/api/health || exit 1
          
      - name: Teste de Frontend
        run: |
          # Testar se o frontend está online
          curl -f https://timecashking.netlify.app || exit 1

  # Notificações
  notify:
    name: Notificações
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: always()
    
    steps:
      - name: Notificar sucesso
        if: needs.integration-tests.result == 'success'
        run: |
          echo "✅ Deploy realizado com sucesso!"
          echo "🌐 Frontend: https://timecashking.netlify.app"
          echo "🔧 Backend: https://timecashking-api.onrender.com"
          echo "📱 Mobile: Builds disponíveis no Expo"
          
      - name: Notificar falha
        if: needs.integration-tests.result == 'failure'
        run: |
          echo "❌ Deploy falhou!"
          echo "Verifique os logs para mais detalhes."
