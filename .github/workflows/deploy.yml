name: Deploy via hooks

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "${RENDER_DEPLOY_HOOK}" ]; then
            curl -fsSL -X POST "${RENDER_DEPLOY_HOOK}"
          else
            echo "RENDER_DEPLOY_HOOK not set, skipping"
          fi

      - name: Trigger Netlify Build Hook (optional)
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          if [ -n "${NETLIFY_BUILD_HOOK}" ]; then
            curl -fsSL -X POST "${NETLIFY_BUILD_HOOK}" || true
          else
            echo "NETLIFY_BUILD_HOOK not set, skipping"
          fi

