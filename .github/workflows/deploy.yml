name: Deploy via hooks

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
      - name: Trigger Netlify Build Hook (optional)
        if: ${{ secrets.NETLIFY_BUILD_HOOK != '' }}
        run: |
          curl -fsSL -X POST "${{ secrets.NETLIFY_BUILD_HOOK }}" || true

