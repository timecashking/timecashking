name: Security Checks
on:
  push:
    branches: [ main ]
jobs:
  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: cd web && npm ci
      - run: cd web && npm audit --audit-level=moderate || echo "Vulnerabilidades encontradas"
