name: Monitoramento
on:
  schedule:
    - cron: '*/15 * * * *'
jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Health Check Backend
        run: curl -f -s https://timecashking-api.onrender.com/api/health || echo "Backend offline"
      - name: Health Check Frontend
        run: curl -f -s https://timecashking.netlify.app || echo "Frontend offline"
