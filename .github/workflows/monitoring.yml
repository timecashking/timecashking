name: Monitoramento e Alertas

on:
  schedule:
    # Executar a cada 15 minutos
    - cron: '*/15 * * * *'
  workflow_dispatch: # Permitir execução manual

jobs:
  # Health Check dos Serviços
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        
      - name: Health Check Backend
        run: |
          echo "🔧 Verificando backend..."
          
          # Tentar 3 vezes com intervalo de 10s
          for i in {1..3}; do
            if curl -f -s https://timecashking-api.onrender.com/api/health; then
              echo "✅ Backend está online"
              break
            else
              echo "❌ Tentativa $i falhou"
              if [ $i -lt 3 ]; then
                sleep 10
              else
                echo "❌ Backend não está respondendo"
                exit 1
              fi
            fi
          done
          
      - name: Health Check Frontend
        run: |
          echo "🌐 Verificando frontend..."
          
          # Tentar 3 vezes com intervalo de 10s
          for i in {1..3}; do
            if curl -f -s https://timecashking.netlify.app; then
              echo "✅ Frontend está online"
              break
            else
              echo "❌ Tentativa $i falhou"
              if [ $i -lt 3 ]; then
                sleep 10
              else
                echo "❌ Frontend não está respondendo"
                exit 1
              fi
            fi
          done

  # Monitoramento de Performance
  performance-monitor:
    name: Monitoramento de Performance
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        
      - name: Teste de Performance Backend
        run: |
          echo "📊 Testando performance do backend..."
          
          # Teste de tempo de resposta
          start_time=$(date +%s)
          response=$(curl -s -o /dev/null -w "%{http_code}" https://timecashking-api.onrender.com/api/health)
          end_time=$(date +%s)
          duration=$((end_time - start_time))
          
          echo "Tempo de resposta: ${duration}s"
          
          if [ $duration -gt 10 ]; then
            echo "⚠️ Tempo de resposta alto: ${duration}s"
          else
            echo "✅ Tempo de resposta OK: ${duration}s"
          fi
          
          if [ "$response" = "200" ]; then
            echo "✅ Status code OK: $response"
          else
            echo "❌ Status code inesperado: $response"
            exit 1
          fi
          
      - name: Teste de Performance Frontend
        run: |
          echo "📊 Testando performance do frontend..."
          
          # Teste de tempo de resposta
          start_time=$(date +%s)
          response=$(curl -s -o /dev/null -w "%{http_code}" https://timecashking.netlify.app)
          end_time=$(date +%s)
          duration=$((end_time - start_time))
          
          echo "Tempo de resposta: ${duration}s"
          
          if [ $duration -gt 15 ]; then
            echo "⚠️ Tempo de resposta alto: ${duration}s"
          else
            echo "✅ Tempo de resposta OK: ${duration}s"
          fi
          
          if [ "$response" = "200" ]; then
            echo "✅ Status code OK: $response"
          else
            echo "❌ Status code inesperado: $response"
            exit 1
          fi

  # Verificação de Endpoints Críticos
  critical-endpoints:
    name: Endpoints Críticos
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        
      - name: Testar Endpoints Críticos
        run: |
          echo "🔍 Testando endpoints críticos..."
          
          # Lista de endpoints críticos
          endpoints=(
            "https://timecashking-api.onrender.com/api/health"
            "https://timecashking-api.onrender.com/api/currency/rates"
            "https://timecashking-api.onrender.com/api/crypto/rates"
          )
          
          for endpoint in "${endpoints[@]}"; do
            echo "Testando: $endpoint"
            
            if curl -f -s "$endpoint" > /dev/null; then
              echo "✅ $endpoint está funcionando"
            else
              echo "❌ $endpoint falhou"
              exit 1
            fi
          done

  # Verificação de SSL/TLS
  ssl-check:
    name: Verificação SSL/TLS
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        
      - name: Verificar SSL Backend
        run: |
          echo "🔒 Verificando SSL do backend..."
          
          # Verificar certificado SSL
          if openssl s_client -connect timecashking-api.onrender.com:443 -servername timecashking-api.onrender.com < /dev/null 2>/dev/null | grep -q "Verify return code: 0"; then
            echo "✅ SSL do backend está válido"
          else
            echo "❌ SSL do backend tem problemas"
            exit 1
          fi
          
      - name: Verificar SSL Frontend
        run: |
          echo "🔒 Verificando SSL do frontend..."
          
          # Verificar certificado SSL
          if openssl s_client -connect timecashking.netlify.app:443 -servername timecashking.netlify.app < /dev/null 2>/dev/null | grep -q "Verify return code: 0"; then
            echo "✅ SSL do frontend está válido"
          else
            echo "❌ SSL do frontend tem problemas"
            exit 1
          fi

  # Alertas e Notificações
  alerts:
    name: Alertas
    runs-on: ubuntu-latest
    needs: [health-check, performance-monitor, critical-endpoints, ssl-check]
    if: always()
    
    steps:
      - name: Gerar Relatório
        run: |
          echo "📋 Relatório de Monitoramento - TimeCash King"
          echo "============================================="
          echo ""
          echo "Status dos jobs:"
          echo "- Health Check: ${{ needs.health-check.result }}"
          echo "- Performance Monitor: ${{ needs.performance-monitor.result }}"
          echo "- Critical Endpoints: ${{ needs.critical-endpoints.result }}"
          echo "- SSL Check: ${{ needs.ssl-check.result }}"
          echo ""
          
          # Contar falhas
          failures=0
          if [[ "${{ needs.health-check.result }}" == "failure" ]]; then ((failures++)); fi
          if [[ "${{ needs.performance-monitor.result }}" == "failure" ]]; then ((failures++)); fi
          if [[ "${{ needs.critical-endpoints.result }}" == "failure" ]]; then ((failures++)); fi
          if [[ "${{ needs.ssl-check.result }}" == "failure" ]]; then ((failures++)); fi
          
          if [ $failures -gt 0 ]; then
            echo "🚨 ALERTA: $failures problema(s) detectado(s)!"
            echo "Verifique os logs para mais detalhes."
            
            # Aqui você pode adicionar notificações para Slack, Discord, etc.
            # Exemplo para Slack:
            # curl -X POST -H 'Content-type: application/json' \
            #   --data '{"text":"🚨 TimeCash King: Problemas detectados no monitoramento!"}' \
            #   ${{ secrets.SLACK_WEBHOOK_URL }}
            
            exit 1
          else
            echo "✅ Todos os serviços estão funcionando normalmente!"
          fi
          
      - name: Log de Status
        run: |
          echo "📅 $(date): Monitoramento executado"
          echo "Status geral: ${{ needs.health-check.result == 'success' && needs.performance-monitor.result == 'success' && needs.critical-endpoints.result == 'success' && needs.ssl-check.result == 'success' && 'SUCCESS' || 'FAILURE' }}"
